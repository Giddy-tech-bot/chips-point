<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#f8fafc;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
    .login-box{background:rgba(30,41,59,0.7);border:1px solid rgba(255,255,255,0.06);padding:30px;border-radius:8px;width:100%;max-width:400px}
    h1{text-align:center;color:#10b981;margin-bottom:30px}
    label{display:block;margin-bottom:8px;color:#94a3b8}
    input{width:100%;padding:10px;background:#334155;color:#f8fafc;border:1px solid rgba(255,255,255,0.06);border-radius:4px;margin-bottom:20px;box-sizing:border-box}
    button{width:100%;padding:12px;background:#10b981;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:600}
    button:hover{background:#059669}
    .error{color:#ef4444;margin-bottom:15px;text-align:center}
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Admin Login</h1>
    <div id="error" class="error"></div>
    <form onsubmit="handleLogin(event)">
      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Enter admin password" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    function getApiBaseUrl(){
      return window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'https://chips-point-backend.onrender.com';
    }

    async function handleLogin(e){
      e.preventDefault();
      const password = document.getElementById('password').value;
      try{
        console.log('Attempting login...');
        const res = await fetch(`${getApiBaseUrl()}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const text = await res.text();
        let json = {};
        try { json = JSON.parse(text); } catch (err) { json = { success: false, message: text }; }
        console.log('Login response status:', res.status);
        console.log('Login response:', json);
        if(!json.success){
          document.getElementById('error').innerText = json.message || 'Login failed';
          return;
        }
        localStorage.setItem('adminToken', json.token);
        console.log('Token saved, redirecting to admin...');
        window.location.href = '/admin.html';
      }catch(err){
        console.error('Login error:', err);
        document.getElementById('error').innerText = 'Connection error: ' + err.message;
      }
    }

    // If already logged in, redirect to admin
    if(localStorage.getItem('adminToken')){
      console.log('Token found, redirecting to admin...');
      window.location.href = '/admin.html';
    }
  </script>
</body>
</html>
